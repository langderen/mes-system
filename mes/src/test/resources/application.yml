server:
  session-timeout: 1800
  port: 9090

spring:
  main:
    allow-bean-definition-overriding: true
  cache:
    type: simple
  mvc:
    view:
      prefix: /templates/
      suffix: .ftl
      static-path-pattern: /static/**
  freemarker:
    suffix: .ftl
    templateEncoding: UTF-8
    templateLoaderPath: classpath:/templates/
    cache: false
    expose-spring-macro-helpers: false
    request-context-attribute: request
    settings:
      classic_compatible: true
      template_exception_handler: rethrow
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql6.sqlpub.com:3311/mes2026?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: wy2026
    password: NCKEipdGm2mGbznC
    druid:
      initial-size: 8
      min-idle: 5
      max-active: 10
      query-timeout: 6000
      transaction-query-timeout: 6000
      remove-abandoned-timeout: 1800
      filters: stat,config
  redis:
    host: localhost
    port: 6379
    password:
    timeout: 10000
    jedis:
      pool:
        max-idle: 8
        min-idle: 10
        max-active: 100
        max-wait: -1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    root: info
    com.wangziyang: debug

file:
  upload-dir: E:/mes-upload
  access-path: /upload

swagger:
  enable: false
  controller: com.wangziyang.mes
  description: MES接口管理
